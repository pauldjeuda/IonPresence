name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android packages
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Install npm dependencies
        run: npm install

      - name: Install Ionic and Capacitor CLI
        run: npm install -g @ionic/cli @capacitor/cli

      - name: Build web app
        run: npm run build

      - name: Add Android platform when missing
        run: |
          if [ ! -d android ]; then
            npx cap add android
          fi

      - name: Sync Capacitor Android project
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: presence-ionic-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Publish GitHub release asset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ionic-apk-${{ github.run_number }}
        run: |
          gh release create "$TAG_NAME" \
            android/app/build/outputs/apk/debug/app-debug.apk#presence-ionic-debug.apk \
            --title "Presence Ionic APK $TAG_NAME" \
            --notes "APK debug généré automatiquement depuis le commit ${{ github.sha }}" \
            --target "${{ github.sha }}"
