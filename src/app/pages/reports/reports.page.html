<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-title>Rapports de présence</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content fullscreen class="reports-content">
  <div class="reports-shell ion-padding">
    <div class="summary-header">
      <p class="eyebrow">Suivi des pointages</p>
      <h1>Vue rapide</h1>
    </div>

    <section class="stats-grid">
      <article class="stat-card ontime">
        <span class="label">À l'heure</span>
        <strong>{{ monthStats?.onTimeCount || 0 }}</strong>
      </article>

      <article class="stat-card late">
        <span class="label">Retards</span>
        <strong>{{ monthStats?.lateCount || 0 }}</strong>
      </article>

      <article class="stat-card total">
        <span class="label">Total</span>
        <strong>{{ monthStats?.total || 0 }}</strong>
      </article>
    </section>
  </div>
</ion-content>

<ion-footer class="ion-no-border app-footer">
  <ion-toolbar>
    <div class="footer-nav">
      <a routerLink="/presence" routerLinkActive="active-link" [routerLinkActiveOptions]="{ exact: true }">
        <ion-icon name="finger-print-outline"></ion-icon>
        <span>Badge</span>
      </a>
      <a routerLink="/reports" routerLinkActive="active-link">
        <ion-icon name="bar-chart-outline"></ion-icon>
        <span>Rapports</span>
      </a>
    </div>
  </ion-toolbar>
</ion-footer>
