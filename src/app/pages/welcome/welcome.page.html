<ion-content [fullscreen]="true" class="welcome-content">
  <div class="welcome-shell">
    <div class="logo-section">
      <div class="logo-container">
        <ion-icon name="location-outline" class="logo-icon"></ion-icon>
      </div>
      <h1 class="app-title">Presence App</h1>
      <p class="app-subtitle">Vérification de présence GPS</p>
    </div>

    <div class="welcome-panel">
      <p class="welcome-text">Renseignez votre nom pour commencer</p>

      <div class="input-section">
        <ion-item lines="none" class="custom-input">
          <ion-icon name="person-outline" slot="start" class="person-icon"></ion-icon>
          <ion-input
            type="text"
            placeholder="Votre nom"
            [(ngModel)]="userName"
            (keyup)="onKeyPress($event)"
            autocomplete="name"
            autocorrect="off"
            autocapitalize="words">
          </ion-input>
        </ion-item>
      </div>

      <ion-button
        expand="block"
        size="large"
        class="start-button"
        [class.ready]="!!userName.trim()"
        [disabled]="!userName.trim() || isSubmitting"
        (click)="startApp()">
        <span>Commencer</span>
        <ion-icon name="arrow-forward-outline" slot="end"></ion-icon>
      </ion-button>
    </div>
  </div>
</ion-content>
